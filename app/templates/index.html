<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduler</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    
    <div class="tasks-zone">
    <h2>Current Tasks</h2>
        <ul> 
            {% for task in task_list %}
                <li>{{ task }}</li>
            {% endfor %}
        </ul>
    </div>

    <div class="backlog-zone">
    <h2>Backlog</h2>
        <ul> 
            {% for task in backlog_list %}
                <li>{{ task }}</li>
            {% endfor %}
        </ul>
    </div>

    <div class="task-buttons">
        <button onClick="toggleAddForm()">New Task</button>
        <button onClick="toggleRemoveForm()">Remove Task</button>
    </div>

    <div id="addForm" class="hidden-form">
        <form method="POST" action="{{ url_for('new_task_form_submission') }}">

            <label for="new_task_name">Enter Name:</label><br>
            <input type="text" id="new_task_name" name="new_task_name"><br>

            <label for="new_task_deadline">Enter Deadline:</label><br>
            <input type="datetime-local" id="new_task_deadline" name="new_task_deadline"><br>

            <label for="new_task_priority">Select Priority Level:</label><br>
            <select id="new_task_priority" name="new_task_priority">
                <option value="lowest">Lowest</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="highest">Highest</option>
            </select><br>

            <label for="new_task_length">Enter Length (Mins):</label><br>
            <input type="number" id="new_task_length" name="new_task_length" value="60" min="0" step="1"><br>

            <button type="submit">Submit</button>
        </form>
    </div>

    <div id="removeForm" class="hidden-form">
        <form method="POST" action="{{ url_for('remove_task_form_submission') }}">

            <label for="remove_task_name">Enter Name:</label><br>
            <input type="text" id="remove_task_name" name="remove_task_name"><br>

            <button type="submit">Submit</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    <div class="calendar-zone">
        <div class="day-labels" id="dayLabels"></div>
        <div class="week-grid">
            <div class="time-column">
                {% for h in range(24) %}
                    <div class="time-slot">{{ h }}</div>
                {% endfor %}
            </div>
    
            <div class="days">
                {% for i in range(7) %}
                    <div class="day-column" data-day="{{ i }}"></div>
                {% endfor %}
            </div>
        </div>
    </div>

    <script>
        const hourHeight = 50;
        const startHour = 0;
        const visibleHours = 24; 
        const maxMinutesPerDay = visibleHours * 60;
        const days = 7;

        let dayTime = Array(days).fill(startHour * 60);
        
        const column = document.querySelector('.day-column[data-day="0"]');

        fetch("/tasks.json")
            .then(response => response.json())
            .then(tasks => {
                // Sort tasks from highest importance to lowest
                tasks.sort((a, b) => b.importance - a.importance);

                let currentDay = 0;

                tasks.forEach(task => {
                // Move to next day if task doesn't fit
                while (currentDay < days && dayTime[currentDay] + task.length > maxMinutesPerDay) {
                    currentDay++;
                }

                // Stop if no days left
                if (currentDay >= days) return;

                const column = document.querySelector(`.day-column[data-day="${currentDay}"]`);
                const startTop = (dayTime[currentDay] / 60) * hourHeight;
                const height = (task.length / 60) * hourHeight;

                const div = document.createElement("div");
                div.className = "item-box";
                div.style.position = "absolute";
                div.style.top = startTop + "px";
                div.style.height = height + "px";
                div.textContent = task.name;

                column.appendChild(div);

                dayTime[currentDay] += task.length;
                });
            });
    </script>

</body>

</html>
